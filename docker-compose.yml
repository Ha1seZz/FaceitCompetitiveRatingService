services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${DB__USER:-postgres}
      POSTGRES_PASSWORD: ${DB__PASSWORD:-postgres}
      POSTGRES_DB: ${DB__NAME:-FaceitCompetitiveRatingService}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    ports:
      - "${DB__PORT:-5432}:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB__USER:-postgres} -d ${DB__NAME:-FaceitCompetitiveRatingService}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped

    ports:
      - "${REDIS__PORT:-6379}:6379"

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  app:
    build:
      context: .
      dockerfile: Dockerfile

    restart: unless-stopped

    env_file:
      - .env

    environment:
      DB__HOST: db
      DB__PORT: 5432
      REDIS__HOST: redis
      REDIS__PORT: 6379

    ports:
      - "8000:8000"

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2 --no-access-log"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped

    env_file:
      - .env

    environment:
      DB__HOST: db
      DB__PORT: 5432
      REDIS__HOST: redis
      REDIS__PORT: 6379

    command: arq app.worker.WorkerSettings

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
