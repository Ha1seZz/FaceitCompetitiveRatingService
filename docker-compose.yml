services:

  db:
    image: postgres:16-alpine

    restart: unless-stopped

    environment:
      POSTGRES_USER: ${DB__USER:-postgres}
      POSTGRES_PASSWORD: ${DB__PASSWORD:-postgres}
      POSTGRES_DB: ${DB__NAME:-FaceitCompetitiveRatingService}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    ports:
      - "${DB__PORT:-5432}:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB__USER:-postgres} -d ${DB__NAME:-FaceitCompetitiveRatingService}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile

    restart: unless-stopped

    env_file:
      - .env

    environment:
      DB__HOST: db
      DB__PORT: 5432

    ports:
      - "8000:8000"

    depends_on:
      db:
        condition: service_healthy

    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1 --no-access-log"

volumes:
  postgres_data: